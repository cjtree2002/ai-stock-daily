<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>我的旅行地图</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root{
    --bg:#ffffff; --panel:#ffffff; --line:#e4e7ef; --text:#1e2130; --muted:#5a6278;
    --accent:#2563eb; --visited:#2563eb; --travel:#2563eb; --business:#e8870b;
    --transit:#7c3aed; --live:#16a34a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}
  header{padding:16px 20px 0}
  h1{margin:0;font-size:20px;font-weight:600}
  .sub{color:var(--muted);font-size:13px;margin-top:4px}
  .stats{display:flex;flex-wrap:wrap;gap:10px;padding:14px 20px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 16px;min-width:96px;box-shadow:0 1px 3px rgba(20,30,60,.06)}
  .card .num{font-size:26px;font-weight:700;line-height:1}
  .card .lab{color:var(--muted);font-size:12px;margin-top:6px}
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:0 20px 12px}
  .toolbar select,.toolbar button{background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer}
  .legend{display:flex;gap:14px;flex-wrap:wrap;color:var(--muted);font-size:12px;margin-left:auto}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
  #map{height:62vh;min-height:380px;margin:0 20px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#eaeef3}
  .leaflet-popup-content{font-size:13px;line-height:1.5}
  .city-label{background:transparent;border:none;box-shadow:none;padding:0;color:#1d4ed8;font-size:12px;font-weight:700;text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 3px #fff;white-space:nowrap}
  .city-label:before{display:none}
  footer{color:var(--muted);font-size:12px;padding:14px 20px 24px}
  a{color:var(--accent)}
  .err{color:#ff6b6b;padding:0 20px}
  .extra{display:flex;flex-wrap:wrap;gap:10px;padding:0 20px 6px}
  .extra .item{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 14px;font-size:13px}
  .extra .item b{color:var(--accent);font-weight:600}
  .extra .item .k{color:var(--muted);margin-right:6px}
  .badges{display:flex;flex-wrap:wrap;gap:8px;padding:0 20px 10px}
  .badge{background:#f1f3f8;border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:12px}
  .badge.on{border-color:var(--accent);background:rgba(37,99,235,.10);color:var(--accent)}
  .badge.off{opacity:.45}
  #playBtn{background:var(--accent);color:#fff;border:none;font-weight:600}
  .playyear{color:var(--accent);font-weight:700;font-size:15px;min-width:46px}
  .chk{display:flex;align-items:center;gap:5px;color:var(--muted);font-size:13px;cursor:pointer}
  .city-label.wish{color:#8b97a3;font-weight:600}
  .charts{display:flex;flex-wrap:wrap;gap:12px;padding:12px 20px 0}
  .chart-card{flex:1;min-width:250px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:0 1px 3px rgba(20,30,60,.06)}
  .chart-card h3{font-size:14px;margin:0 0 12px;font-weight:600}
  .bars{display:flex;align-items:flex-end;gap:8px;height:110px}
  .bar-col{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:3px;flex:1;height:100%}
  .bar{width:70%;max-width:36px;background:var(--accent);border-radius:4px 4px 0 0;min-height:4px}
  .bar-num{font-size:11px;color:var(--accent);font-weight:600}
  .bar-year{font-size:11px;color:var(--muted)}
  .rank{font-size:13px;line-height:2.1}
  .rank .pos{color:var(--muted);margin-right:6px}
  .rank .cnt{color:var(--muted);float:right}
</style>
</head>
<body>
<header>
  <h1>🗺️ 我的旅行地图</h1>
  <div class="sub">城市打点 + 国家高亮 · 数据来自你的 Google 表格（城市坐标自动定位）</div>
</header>

<div class="stats" id="stats"></div>

<div class="extra" id="extremes"></div>
<div class="badges" id="badges"></div>

<div class="toolbar">
  <label style="color:var(--muted);font-size:13px">按年份：</label>
  <select id="yearFilter"><option value="all">全部</option></select>
  <label style="color:var(--muted);font-size:13px">类型：</label>
  <select id="typeFilter">
    <option value="all">全部</option>
    <option value="travel">旅游</option>
    <option value="business">出差</option>
    <option value="transit">转机</option>
    <option value="live">居住</option>
    <option value="wish">想去</option>
  </select>
  <label style="color:var(--muted);font-size:13px">国家：</label>
  <select id="countryFilter"><option value="all">全部</option></select>
  <label class="chk"><input type="checkbox" id="wishOnly"> ⭐只看想再去</label>
  <button id="playBtn">▶ 按年播放</button>
  <span id="playYear" class="playyear"></span>
  <div class="legend">
    <span><i class="dot" style="background:var(--travel)"></i>旅游</span>
    <span><i class="dot" style="background:var(--business)"></i>出差</span>
    <span><i class="dot" style="background:var(--transit)"></i>转机</span>
    <span><i class="dot" style="background:var(--live)"></i>居住</span>
    <span><i class="dot" style="background:#fff;border:2px dashed #9aa4b2"></i>想去</span>
  </div>
</div>

<div id="err" class="err"></div>
<div id="status" style="color:#5a6278;font-size:13px;padding:0 20px"></div>
<div id="map"></div>
<div class="charts" id="charts"></div>
<footer>
  更新方式：在你的 Google 表格里加一行（城市、国家、年份等），保存后过几分钟刷新本页即可，
  <b>经纬度两列可留空</b>，地图会自动定位城市坐标。
  类型可填：旅游 / 出差 / 转机 / 居住 / <b>想去</b>（想去的地方会以虚线空心点显示，不计入统计）。
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const COLORS = { travel:'#2563eb', business:'#e8870b', transit:'#7c3aed', live:'#16a34a' };
const TYPE_ZH = { travel:'旅游', business:'出差', transit:'转机', live:'居住', wish:'想去' };
// 国家名 -> 大洲（覆盖常见旅行国家；未列出的不计入大洲统计）
const CONTINENT = {
  "China":"亚洲","Japan":"亚洲","South Korea":"亚洲","Thailand":"亚洲","Vietnam":"亚洲","Singapore":"亚洲","Malaysia":"亚洲","Indonesia":"亚洲","India":"亚洲","Philippines":"亚洲","Cambodia":"亚洲","Laos":"亚洲","Myanmar":"亚洲","Nepal":"亚洲","Sri Lanka":"亚洲","Maldives":"亚洲","United Arab Emirates":"亚洲","Turkey":"亚洲","Israel":"亚洲","Qatar":"亚洲","Saudi Arabia":"亚洲","Kazakhstan":"亚洲","Mongolia":"亚洲",
  "France":"欧洲","Germany":"欧洲","United Kingdom":"欧洲","Italy":"欧洲","Spain":"欧洲","Portugal":"欧洲","Netherlands":"欧洲","Belgium":"欧洲","Switzerland":"欧洲","Austria":"欧洲","Greece":"欧洲","Sweden":"欧洲","Norway":"欧洲","Denmark":"欧洲","Finland":"欧洲","Iceland":"欧洲","Ireland":"欧洲","Poland":"欧洲","Czechia":"欧洲","Czech Republic":"欧洲","Hungary":"欧洲","Croatia":"欧洲","Russia":"欧洲",
  "United States":"北美洲","Canada":"北美洲","Mexico":"北美洲","Cuba":"北美洲","Costa Rica":"北美洲",
  "Brazil":"南美洲","Argentina":"南美洲","Chile":"南美洲","Peru":"南美洲","Colombia":"南美洲","Bolivia":"南美洲","Ecuador":"南美洲",
  "Egypt":"非洲","Morocco":"非洲","South Africa":"非洲","Kenya":"非洲","Tanzania":"非洲","Tunisia":"非洲",
  "Australia":"大洋洲","New Zealand":"大洋洲","Fiji":"大洋洲"
};
// 常见别名 -> 地图GeoJSON里的标准英文名
const ALIAS = {
  "USA":"United States","US":"United States","UK":"United Kingdom","UAE":"United Arab Emirates",
  "Korea":"South Korea","Czech Republic":"Czechia"
};
const GEOJSON_URL = "https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json";
// 你的 Google 表格（发布为 CSV）
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRbqSxtEgE1cjZjp_s6X7KI0Ek20W56mwc8bGLzpRpQhR1aDSg6jlq8Vnu_AnFXx4OQOwxMZmNv8GqO/pub?output=csv";
const GEO_CACHE_KEY = "travel_geocache_v1";

let allPlaces = [], map, markerLayer, countryLayer, geoData;
let playMaxYear = null, playTimer = null, homePlace = null;

function norm(name){ return ALIAS[name] || name; }

// ── CSV 解析（支持引号、逗号、换行）──
function parseCSV(text){
  const rows=[]; let row=[], field='', inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else inQ=false; }
      else field+=c;
    } else if(c==='"'){ inQ=true; }
    else if(c===','){ row.push(field); field=''; }
    else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
    else if(c!=='\r'){ field+=c; }
  }
  if(field.length||row.length){ row.push(field); rows.push(row); }
  return rows;
}
function csvToPlaces(text){
  const rows=parseCSV(text).filter(r=>r.some(c=>c.trim()!==''));
  if(rows.length<2) return [];
  // 表头兼容：英文字段名 或 表单里的中文问题标题都能识别
  const HALIAS={'国家英文':'country','国家（英文）':'country','国家中文':'country_zh','城市':'city',
    '纬度':'lat','经度':'lon','年份':'year','类型':'type','去过几次':'visits','次数':'visits',
    '备注':'note','想再去':'wishmore','想再去吗':'wishmore'};
  const header=rows[0].map(h=>{ const raw=h.trim(); return HALIAS[raw] || raw.toLowerCase(); });
  const idx=n=>header.indexOf(n);
  const iC=idx('country'),iCz=idx('country_zh'),iCity=idx('city'),iLat=idx('lat'),iLon=idx('lon'),
        iY=idx('year'),iT=idx('type'),iV=idx('visits'),iN=idx('note'),iW=idx('wishmore');
  const g=(r,i)=> i>=0&&i<r.length ? r[i].trim() : '';
  const num=v=>{ const n=parseFloat(v); return isFinite(n)?n:null; };
  return rows.slice(1).map(r=>({
    country:g(r,iC), country_zh:g(r,iCz), city:g(r,iCity),
    lat:num(g(r,iLat)), lon:num(g(r,iLon)),
    year:parseInt(g(r,iY))||null,
    type:({'旅游':'travel','出差':'business','转机':'transit','居住':'live','想去':'wish'}[g(r,iT)] || g(r,iT) || 'travel').toLowerCase(),
    visits:parseInt(g(r,iV))||1,
    note:g(r,iN),
    wishMore:/^(true|1|yes|是)$/i.test(g(r,iW))
  })).filter(p=>p.country && p.city);
}

// ── 缺坐标的城市自动定位（缓存到浏览器，只查一次）──
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const geoKey=p=>(p.city+'|'+p.country).toLowerCase();
function loadGeoCache(){ try{ return JSON.parse(localStorage.getItem(GEO_CACHE_KEY))||{}; }catch(e){ return {}; } }
function saveGeoCache(c){ try{ localStorage.setItem(GEO_CACHE_KEY, JSON.stringify(c)); }catch(e){} }
async function geocodeMissing(){
  const cache=loadGeoCache();
  const missing=allPlaces.filter(p=>p.lat==null||p.lon==null);
  // 先套用缓存
  missing.forEach(p=>{ const k=geoKey(p); if(cache[k]){ p.lat=cache[k].lat; p.lon=cache[k].lon; } });
  homePlace=pickHome(allPlaces); refresh();
  const todo=allPlaces.filter(p=>p.lat==null||p.lon==null);
  const status=document.getElementById('status');
  for(let i=0;i<todo.length;i++){
    const p=todo[i];
    status.textContent=`正在定位城市 ${i+1}/${todo.length}：${p.city} …`;
    try{
      const q=p.city+(p.country?(', '+p.country):'');
      const url='https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&accept-language=en&q='+encodeURIComponent(q);
      const r=await fetch(url,{headers:{'Accept':'application/json'}});
      const d=await r.json();
      if(d.length){
        p.lat=+(+d[0].lat).toFixed(4); p.lon=+(+d[0].lon).toFixed(4);
        cache[geoKey(p)]={lat:p.lat,lon:p.lon}; saveGeoCache(cache);
        homePlace=pickHome(allPlaces); refresh();
      }
    }catch(e){}
    await sleep(1100); // 遵守 Nominatim 每秒1次限制
  }
  const failed=allPlaces.filter(p=>p.lat==null||p.lon==null);
  status.textContent = failed.length
    ? `⚠️ 有 ${failed.length} 个城市没定位到（${failed.map(p=>p.city).join('、')}），可在表格里手动填 lat/lon`
    : '';
}

// 大圆距离 (km)
function haversine(a, b){
  const R=6371, toR=x=>x*Math.PI/180;
  const dLat=toR(b.lat-a.lat), dLon=toR(b.lon-a.lon);
  const s=Math.sin(dLat/2)**2 + Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
// 选“家”：优先 type=live，否则去过次数最多的城市（想去的不算）
function pickHome(places){
  const been = places.filter(p=>p.type!=='wish');
  const live = been.find(p=>p.type==='live');
  if(live) return live;
  return been.slice().sort((a,b)=>(b.visits||1)-(a.visits||1))[0] || null;
}

// 当前筛选（年份 / 类型 / 国家 / 只看想再去 / 播放进度综合）
function filteredPlaces(){
  const yr = document.getElementById('yearFilter').value;
  const tp = document.getElementById('typeFilter').value;
  const cf = document.getElementById('countryFilter').value;
  const wOnly = document.getElementById('wishOnly').checked;
  return allPlaces.filter(p => {
    if(tp!=='all' && p.type!==tp) return false;
    if(cf!=='all' && norm(p.country)!==cf) return false;
    if(wOnly && !p.wishMore) return false;
    if(playMaxYear!=null) return (p.year||9999) <= playMaxYear; // 播放时累积显示
    if(yr!=='all' && String(p.year)!==yr) return false;
    return true;
  });
}

function renderStats(places, wishCount){
  const countries = new Set(places.map(p=>norm(p.country)));
  const cities    = new Set(places.map(p=>(p.country)+'|'+p.city));
  const continents= new Set(places.map(p=>CONTINENT[norm(p.country)]).filter(Boolean));
  const years     = places.map(p=>p.year).filter(Boolean);
  const firstYear = years.length ? Math.min(...years) : '—';
  const totalVisits = places.reduce((s,p)=>s+(p.visits||1),0);
  const cards = [
    ['国家', countries.size],
    ['城市', cities.size],
    ['大洲', continents.size + ' / 7'],
    ['首次出行', firstYear],
    ['累计到访', totalVisits]
  ];
  if(wishCount) cards.push(['想去', wishCount]);
  document.getElementById('stats').innerHTML = cards.map(([lab,num])=>
    `<div class="card"><div class="num">${num}</div><div class="lab">${lab}</div></div>`).join('');
}

function renderExtremes(places){
  const el = document.getElementById('extremes');
  const pts = places.filter(p=>p.lat!=null&&p.lon!=null);
  if(!pts.length){ el.innerHTML=''; return; }
  const label = p => `${p.city}·${p.country_zh||p.country}`;
  const north = pts.reduce((a,b)=>b.lat>a.lat?b:a);
  const south = pts.reduce((a,b)=>b.lat<a.lat?b:a);
  // 离家最远 + 累计里程估算（从家到各城市的大圆距离之和，往返×2）
  let farthest=null, maxD=0, totalKm=0;
  if(homePlace){
    pts.forEach(p=>{
      if(p===homePlace) return;
      const d = haversine(homePlace, p);
      totalKm += d*2*(p.visits||1);
      if(d>maxD){ maxD=d; farthest=p; }
    });
  }
  const hemi = lat => `${Math.abs(lat).toFixed(1)}°${lat>=0?'N':'S'}`;
  const items = [
    ['最北', `${label(north)} (${hemi(north.lat)})`],
    ['最南', `${label(south)} (${hemi(south.lat)})`],
  ];
  if(farthest) items.push(['离家最远', `${label(farthest)} ${Math.round(maxD).toLocaleString()} km`]);
  if(totalKm)  items.push(['累计里程估算', `${Math.round(totalKm).toLocaleString()} km（往返，约绕地球 ${(totalKm/40075).toFixed(1)} 圈）`]);
  el.innerHTML = items.map(([k,v])=>`<div class="item"><span class="k">${k}</span><b>${v}</b></div>`).join('');
}

function renderBadges(places){
  const el = document.getElementById('badges');
  const nCountries = new Set(places.map(p=>norm(p.country))).size;
  const nCities    = new Set(places.map(p=>p.country+'|'+p.city)).size;
  const continents = new Set(places.map(p=>CONTINENT[norm(p.country)]).filter(Boolean));
  const pts = places.filter(p=>p.lat!=null);
  const crossEquator = pts.some(p=>p.lat>0) && pts.some(p=>p.lat<0);
  const arctic = pts.some(p=>p.lat>=66.5);
  const defs = [
    [nCountries>=5,  `🌍 ${nCountries>=5?'已达':'未达'} 5 国`],
    [nCountries>=10, '🛂 10 国俱乐部'],
    [nCountries>=25, '✈️ 25 国旅人'],
    [nCities>=20,    '🏙️ 20 城打卡'],
    [continents.size>=3, '🧭 三大洲'],
    [continents.size>=5, '🗺️ 五大洲'],
    [continents.size>=7, '🏆 七大洲全集'],
    [crossEquator,   '🌐 跨越赤道'],
    [arctic,         '❄️ 北极圈'],
  ];
  el.innerHTML = defs.map(([on,txt])=>
    `<span class="badge ${on?'on':'off'}">${on?'':'🔒 '}${txt}</span>`).join('');
}

// ── 年度图表 + 排行榜（基于全部去过的数据，不随筛选变化）──
function renderCharts(){
  const el = document.getElementById('charts');
  const been = allPlaces.filter(p=>p.type!=='wish');
  if(!been.length){ el.innerHTML=''; return; }

  // 每个城市/国家的“首访年份”
  const cityFirst = {}, countryFirst = {};
  been.forEach(p=>{
    if(!p.year) return;
    const ck = geoKey(p), nk = norm(p.country);
    if(!(ck in cityFirst)   || p.year < cityFirst[ck])   cityFirst[ck]   = p.year;
    if(!(nk in countryFirst)|| p.year < countryFirst[nk]) countryFirst[nk] = p.year;
  });
  const perYear = {};
  Object.values(cityFirst).forEach(y=>{ perYear[y]=perYear[y]||{c:0,n:0}; perYear[y].c++; });
  Object.values(countryFirst).forEach(y=>{ perYear[y]=perYear[y]||{c:0,n:0}; perYear[y].n++; });
  const years = Object.keys(perYear).map(Number).sort((a,b)=>a-b);
  const maxC = Math.max(...years.map(y=>perYear[y].c), 1);
  const barsHtml = years.map(y=>{
    const d = perYear[y];
    const h = Math.max(8, Math.round(d.c/maxC*90));
    return `<div class="bar-col">
      <div class="bar-num">${d.c}${d.n?`<span style="color:#16a34a"> +${d.n}国`:''}${d.n?'</span>':''}</div>
      <div class="bar" style="height:${h}px" title="${y}年：新到 ${d.c} 城${d.n?'、'+d.n+' 个新国家':''}"></div>
      <div class="bar-year">${y}</div>
    </div>`;
  }).join('');

  // 排行榜：最常去的城市（按累计次数）/ 城市最多的国家
  const cityAgg = {}, countryAgg = {};
  been.forEach(p=>{
    const ck = geoKey(p);
    cityAgg[ck] = cityAgg[ck] || {label:`${p.city}·${p.country_zh||p.country}`, v:0};
    cityAgg[ck].v += (p.visits||1);
    const nk = norm(p.country);
    countryAgg[nk] = countryAgg[nk] || {label:p.country_zh||p.country, cities:new Set()};
    countryAgg[nk].cities.add(p.city.toLowerCase());
  });
  const medal = i => ['🥇','🥈','🥉'][i] || (i+1)+'.';
  const topCities = Object.values(cityAgg).sort((a,b)=>b.v-a.v).slice(0,3)
    .map((c,i)=>`<div><span class="pos">${medal(i)}</span><b>${c.label}</b><span class="cnt">${c.v} 次</span></div>`).join('');
  const topCountries = Object.values(countryAgg)
    .map(c=>({label:c.label, n:c.cities.size}))
    .sort((a,b)=>b.n-a.n).slice(0,3)
    .map((c,i)=>`<div><span class="pos">${medal(i)}</span><b>${c.label}</b><span class="cnt">${c.n} 城</span></div>`).join('');

  el.innerHTML =
    (years.length ? `<div class="chart-card"><h3>📅 每年新到城市</h3><div class="bars">${barsHtml}</div></div>` : '') +
    `<div class="chart-card"><h3>🏅 最常去的城市</h3><div class="rank">${topCities}</div></div>` +
    `<div class="chart-card"><h3>🌍 城市最多的国家</h3><div class="rank">${topCountries}</div></div>`;
}

function stopPlay(){
  if(playTimer){ clearInterval(playTimer); playTimer=null; }
  playMaxYear=null;
  document.getElementById('playBtn').textContent='▶ 按年播放';
  document.getElementById('playYear').textContent='';
  refresh();
}
function startPlay(){
  const years=[...new Set(allPlaces.map(p=>p.year).filter(Boolean))].sort((a,b)=>a-b);
  if(!years.length) return;
  let i=0;
  document.getElementById('playBtn').textContent='⏹ 停止';
  playMaxYear=years[0];
  const step=()=>{
    playMaxYear=years[i];
    document.getElementById('playYear').textContent=years[i];
    refresh();
    i++;
    if(i>=years.length){ clearInterval(playTimer); playTimer=null;
      document.getElementById('playBtn').textContent='▶ 重新播放'; }
  };
  step();
  playTimer=setInterval(step, 1100);
}

function refresh(){
  const filtered = filteredPlaces();
  const visited  = filtered.filter(p=>p.type!=='wish');   // 想去的不计入统计

  renderStats(visited, filtered.length - visited.length);
  renderExtremes(visited);
  renderBadges(visited);
  renderCharts();

  // 城市点（同一城市的多条记录合并为一个点，弹窗按年份列出）
  markerLayer.clearLayers();
  const bounds = [];
  const groups = {};
  filtered.forEach(p=>{
    if(p.lat==null||p.lon==null) return;
    const k = geoKey(p);
    (groups[k]=groups[k]||[]).push(p);
  });
  Object.values(groups).forEach(g=>{
    g.sort((a,b)=>(b.year||0)-(a.year||0));   // 最近一次在前，想去(无年份)排最后
    const p = g[0];
    const isWish = g.every(x=>x.type==='wish');
    const totalV = g.reduce((s,x)=>s+(x.visits||1),0);
    const color = COLORS[p.type] || COLORS.travel;
    const m = L.circleMarker([p.lat,p.lon], isWish
      ? { radius:6, color:'#9aa4b2', weight:1.5, dashArray:'3,3', fillColor:'#fff', fillOpacity:0.7 }
      : { radius: 5 + Math.min(totalV,5), color:'#fff', weight:1, fillColor:color, fillOpacity:0.9 });
    const lines = isWish
      ? ['🌟 想去的地方' + (p.note?` · <span style="color:#666">${p.note}</span>`:'')]
      : g.map(x=>
        `${x.year||''} · ${TYPE_ZH[x.type]||x.type||''} · ${x.visits||1} 次`+
        (x.note?` <span style="color:#666">${x.note}</span>`:''));
    m.bindPopup(
      `<b>${p.city}</b> · ${p.country_zh||p.country}`+
      (g.some(x=>x.wishMore)?' ⭐想再去':'')+
      '<br>'+lines.join('<br>')
    );
    // 常驻城市名标签（颜色与底图国家名不同）
    m.bindTooltip(p.city, {permanent:true, direction:'right', offset:[7,0],
      className:'city-label'+(isWish?' wish':'')});
    m.addTo(markerLayer);
    bounds.push([p.lat,p.lon]);
  });

  // 国家高亮
  if(countryLayer) countryLayer.setStyle(styleCountry);
  // 播放时保持视图稳定，不重复缩放
  if(bounds.length && playMaxYear==null) map.fitBounds(bounds, {padding:[40,40], maxZoom:5});
}

function visitedCountrySet(){
  return new Set(filteredPlaces().filter(p=>p.type!=='wish').map(p=>norm(p.country)));
}
function styleCountry(feature){
  const visited = visitedCountrySet();
  const name = feature.properties.name;
  const on = visited.has(name);
  return { fillColor: on?'#2563eb':'#c9d2dd', fillOpacity:on?0.30:0.10,
           color:'#aab4c0', weight:0.5 };
}

async function init(){
  map = L.map('map', {worldCopyJump:true}).setView([20,10], 2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution:'© OpenStreetMap © CARTO', subdomains:'abcd', maxZoom:19
  }).addTo(map);
  markerLayer = L.layerGroup().addTo(map);

  // 数据（来自 Google 表格 CSV）
  try{
    const res = await fetch(CSV_URL + '&_=' + Date.now());
    const text = await res.text();
    allPlaces = csvToPlaces(text);
    homePlace = pickHome(allPlaces);
    if(!allPlaces.length) document.getElementById('err').textContent = '表格里还没有有效数据（至少要填 country 和 city）';
  }catch(e){
    document.getElementById('err').textContent = '加载表格失败：' + e.message;
    return;
  }

  // 年份下拉
  const years = [...new Set(allPlaces.map(p=>p.year).filter(Boolean))].sort((a,b)=>b-a);
  const sel = document.getElementById('yearFilter');
  years.forEach(y=>{ const o=document.createElement('option'); o.value=y; o.textContent=y; sel.appendChild(o); });
  sel.addEventListener('change', ()=>{ if(playTimer||playMaxYear!=null) return; refresh(); });
  document.getElementById('typeFilter').addEventListener('change', refresh);

  // 国家下拉（用中文名显示，按出现顺序去重后排序）
  const cSel = document.getElementById('countryFilter');
  const seen = new Map();
  allPlaces.forEach(p=>{ const k=norm(p.country); if(!seen.has(k)) seen.set(k, p.country_zh||p.country); });
  [...seen.entries()].sort((a,b)=>a[1].localeCompare(b[1],'zh')).forEach(([k,label])=>{
    const o=document.createElement('option'); o.value=k; o.textContent=label; cSel.appendChild(o);
  });
  cSel.addEventListener('change', refresh);
  document.getElementById('wishOnly').addEventListener('change', refresh);

  // 时间轴播放
  document.getElementById('playBtn').addEventListener('click', ()=>{
    if(playTimer || playMaxYear!=null) stopPlay(); else startPlay();
  });

  // 国家边界
  try{
    const g = await fetch(GEOJSON_URL);
    geoData = await g.json();
    countryLayer = L.geoJSON(geoData, {style:styleCountry}).addTo(map);
    countryLayer.bringToBack();
  }catch(e){ /* 高亮失败不影响打点 */ }

  refresh();
  geocodeMissing();   // 给缺坐标的城市自动定位
}
init();
</script>
