<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>录入旅行地点</title>
<style>
  :root{ --bg:#0f1419; --panel:#1a2129; --line:#2a3540; --text:#e6edf3; --muted:#8b97a3; --accent:#4ea1ff; --ok:#2ec27e; --danger:#ff6b6b; }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);padding:20px;max-width:760px;margin:0 auto}
  h1{font-size:20px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:16px}
  .sub a{color:var(--accent)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px}
  label{font-size:12px;color:var(--muted)}
  input,select{background:#0f1419;color:var(--text);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:14px;width:100%}
  input[type=checkbox]{width:auto}
  button{background:var(--accent);color:#08101a;border:none;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer}
  button.ghost{background:transparent;color:var(--text);border:1px solid var(--line);font-weight:500}
  button.ghost:hover{border-color:var(--accent)}
  .msg{font-size:13px;margin-top:8px;min-height:18px}
  .msg.ok{color:var(--ok)} .msg.err{color:var(--danger)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:7px 8px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:500}
  td .del{color:var(--danger);cursor:pointer;background:none;border:none;font-size:13px;padding:0}
  .bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px}
  .count{color:var(--muted);font-size:13px;margin-right:auto}
  code{background:#0f1419;padding:1px 5px;border-radius:4px}
  .note{background:#1d2730;border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px;margin-bottom:12px;display:none}
  .note button{font-size:12px;padding:3px 10px;margin-left:8px}
</style>
</head>
<body>
  <h1>✍️ 录入旅行地点</h1>
  <div class="sub">输入城市名自动查坐标与国家 · 添加后下载 <code>places.json</code> 覆盖原文件并 push 即可。
    <a href="travel.html" target="_blank">查看地图 →</a></div>

  <div class="note" id="draftNote">检测到上次未保存的草稿。
    <button class="ghost" onclick="reloadFromFile()">从 places.json 重新载入</button>
  </div>

  <div class="panel">
    <div class="row">
      <div class="field" style="flex:2"><label>城市（中文或英文均可）</label><input id="city" placeholder="例如 大阪 / Osaka" /></div>
      <div class="field"><label>所在国家（可选，帮助消歧）</label><input id="qcountry" placeholder="例如 Japan" /></div>
      <div class="field" style="flex:0 0 auto;justify-content:flex-end"><button class="ghost" onclick="geocode()">🔍 查询坐标</button></div>
    </div>
    <div class="row">
      <div class="field"><label>国家(英文,用于高亮)</label><input id="country" placeholder="United States" /></div>
      <div class="field"><label>国家(中文显示)</label><input id="country_zh" placeholder="美国" /></div>
      <div class="field"><label>城市名(存档用)</label><input id="cityName" placeholder="New York" /></div>
    </div>
    <div class="row">
      <div class="field"><label>纬度 lat</label><input id="lat" /></div>
      <div class="field"><label>经度 lon</label><input id="lon" /></div>
      <div class="field"><label>年份</label><input id="year" type="number" placeholder="2024" /></div>
      <div class="field"><label>去过几次</label><input id="visits" type="number" value="1" min="1" /></div>
    </div>
    <div class="row">
      <div class="field"><label>类型</label>
        <select id="type">
          <option value="travel">旅游</option>
          <option value="business">出差</option>
          <option value="transit">转机</option>
          <option value="live">居住</option>
        </select>
      </div>
      <div class="field" style="flex:2"><label>备注</label><input id="note" placeholder="可留空" /></div>
      <div class="field" style="flex:0 0 auto;justify-content:flex-end">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="wishMore" /> ⭐想再去</label>
      </div>
    </div>
    <button onclick="addEntry()">＋ 添加到列表</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="panel">
    <table>
      <thead><tr><th>城市</th><th>国家</th><th>年</th><th>类型</th><th>次</th><th></th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="bar">
      <span class="count" id="count"></span>
      <button class="ghost" onclick="copyJson()">📋 复制 JSON</button>
      <button onclick="downloadJson()">⬇️ 下载 places.json</button>
    </div>
    <div class="msg" id="msg2"></div>
  </div>

<script>
const DRAFT_KEY = 'travel_places_draft';
let list = [];

function regionName(code, locale){
  try{ return new Intl.DisplayNames([locale], {type:'region'}).of(code.toUpperCase()); }
  catch(e){ return ''; }
}
function $(id){ return document.getElementById(id); }
function setMsg(id, text, ok){ const el=$(id); el.textContent=text; el.className='msg '+(ok?'ok':'err'); }

async function geocode(){
  const city = $('city').value.trim();
  if(!city){ setMsg('msg','请先填城市名', false); return; }
  const q = city + ($('qcountry').value.trim()? (', '+$('qcountry').value.trim()) : '');
  setMsg('msg','查询中…', true);
  try{
    const url = 'https://nominatim.openstreetmap.org/search?format=jsonv2&addressdetails=1&limit=1&accept-language=en&q=' + encodeURIComponent(q);
    const r = await fetch(url, {headers:{'Accept':'application/json'}});
    const data = await r.json();
    if(!data.length){ setMsg('msg','没查到，换个写法或手动填坐标', false); return; }
    const it = data[0];
    const cc = it.address && it.address.country_code ? it.address.country_code : '';
    $('lat').value = (+it.lat).toFixed(4);
    $('lon').value = (+it.lon).toFixed(4);
    $('country').value = (it.address && it.address.country) || (cc?regionName(cc,'en'):'');
    $('country_zh').value = cc ? regionName(cc,'zh') : '';
    $('cityName').value = $('cityName').value || city;
    setMsg('msg','✓ 已填入坐标，确认后点添加', true);
  }catch(e){ setMsg('msg','查询失败：'+e.message+'（可手动填坐标）', false); }
}

function addEntry(){
  const e = {
    country: $('country').value.trim(),
    country_zh: $('country_zh').value.trim(),
    city: $('cityName').value.trim() || $('city').value.trim(),
    lat: parseFloat($('lat').value),
    lon: parseFloat($('lon').value),
    year: parseInt($('year').value)||null,
    type: $('type').value,
    visits: parseInt($('visits').value)||1,
    note: $('note').value.trim(),
    wishMore: $('wishMore').checked
  };
  if(!e.country || !e.city || isNaN(e.lat) || isNaN(e.lon)){
    setMsg('msg','国家/城市/坐标必填（点查询坐标自动获取）', false); return;
  }
  list.push(e);
  save(); render();
  ['city','qcountry','country','country_zh','cityName','lat','lon','note'].forEach(id=>$(id).value='');
  $('wishMore').checked=false;
  setMsg('msg','✓ 已添加：'+e.city, true);
}

function removeEntry(i){ list.splice(i,1); save(); render(); }

function render(){
  const tb=$('tbody'); tb.innerHTML='';
  const TZ={travel:'旅游',business:'出差',transit:'转机',live:'居住'};
  list.forEach((e,i)=>{
    const tr=document.createElement('tr');
    tr.innerHTML = `<td>${e.city}${e.wishMore?' ⭐':''}</td><td>${e.country_zh||e.country}</td>`+
      `<td>${e.year||''}</td><td>${TZ[e.type]||e.type}</td><td>${e.visits}</td>`+
      `<td><button class="del" data-i="${i}">删除</button></td>`;
    tb.appendChild(tr);
  });
  tb.querySelectorAll('.del').forEach(b=>b.onclick=()=>removeEntry(+b.dataset.i));
  $('count').textContent = '共 '+list.length+' 条';
}

function buildJson(){
  return JSON.stringify({
    "_说明":"在 places 数组里增删条目即可更新地图。字段见录入页。",
    places: list
  }, null, 2);
}
function downloadJson(){
  const blob=new Blob([buildJson()],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='places.json'; a.click();
  setMsg('msg2','✓ 已下载，覆盖 docs/places.json 后 push', true);
}
async function copyJson(){
  try{ await navigator.clipboard.writeText(buildJson()); setMsg('msg2','✓ 已复制完整 JSON', true); }
  catch(e){ setMsg('msg2','复制失败，请用下载', false); }
}

function save(){ localStorage.setItem(DRAFT_KEY, JSON.stringify(list)); }

async function loadFromFile(){
  try{ const r=await fetch('places.json?_='+Date.now()); const d=await r.json(); return d.places||[]; }
  catch(e){ return []; }
}
async function reloadFromFile(){
  list = await loadFromFile(); localStorage.removeItem(DRAFT_KEY);
  $('draftNote').style.display='none'; render();
}
async function init(){
  const fileList = await loadFromFile();
  const draft = localStorage.getItem(DRAFT_KEY);
  if(draft){
    list = JSON.parse(draft);
    if(JSON.stringify(list)!==JSON.stringify(fileList)) $('draftNote').style.display='block';
  } else {
    list = fileList;
  }
  render();
}
init();
</script>
</body>
</html>
