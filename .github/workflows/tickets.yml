name: 演出开票提醒

on:
  schedule:
    - cron: "0 1 * * *"        # 每天 UTC 01:00 = 北京/新加坡 09:00 跑一次
  workflow_dispatch:            # 也可在 GitHub 网页上手动点一次

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run ticket watcher
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          WEIBO_COOKIE:       ${{ secrets.WEIBO_COOKIE }}   # 可选:微博登录 cookie,配了才抓微博
          RSSHUB_BASE:        ${{ secrets.RSSHUB_BASE }}     # 可选:自建 RSSHub 地址(第三阶段)
        run: python ticket_watch.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tickets_state.json docs/tickets/
          git diff --cached --quiet || git commit -m "🎫 演出开票检查 $(date +'%Y-%m-%d')"
          git push
