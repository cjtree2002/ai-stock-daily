name: Daily AI Stock Report

on:
  schedule:
    # 08:11 Beijing time = 00:11 UTC (off-the-hour to avoid GitHub's congested top-of-hour queue)
    - cron: "11 0 * * 1-5"   # weekdays only
  workflow_dispatch:          # allow manual trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Generate report
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          mkdir -p docs
          python fetch_news.py
          cp reports/latest.html docs/index.html
          # Keep dated copies in docs/ as archive
          cp reports/latest.html docs/$(date +'%Y-%m-%d').html

      - name: Commit and push report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ docs/
          git diff --cached --quiet || git commit -m "📊 Daily report $(date +'%Y-%m-%d')"
          git push
