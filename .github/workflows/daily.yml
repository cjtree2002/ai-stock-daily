name: Daily AI Stock Report

on:
  schedule:
    # 08:00 Beijing time = 00:00 UTC
    - cron: "0 0 * * 1-5"   # weekdays only
  workflow_dispatch:          # allow manual trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Generate report
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          python fetch_news.py
          # Also copy latest.html to index.html so GitHub Pages serves it directly
          cp reports/latest.html reports/index.html

      - name: Commit and push report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "📊 Daily report $(date +'%Y-%m-%d')"
          git push
