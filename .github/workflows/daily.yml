name: Daily AI Stock Report

on:
  schedule:
    - cron: "40 0 * * 1-5"
  workflow_dispatch:
    inputs:
      force_ai:
        description: 'Force AI rebalance even if already ran today (1=yes)'
        required: false
        default: '0'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests yfinance anthropic

      - name: AI rebalance & morning commentary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AI_REBALANCE_FORCE: ${{ github.event.inputs.force_ai || '0' }}
        run: |
          python ai_rebalance.py || {
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode text="⚠️ AI调仓/晨评步骤失败，今日维持原持仓，日报仍会正常生成。"
            true
          }

      - name: Generate report
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p docs
          python fetch_news.py
          if [ -f reports/.generated ]; then
            cp reports/latest.html docs/index.html
            cp reports/latest.html docs/$(date +'%Y-%m-%d').html
          else
            echo "Non-trading day - site left unchanged."
          fi

      - name: Commit and push report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ docs/ portfolio.json commentary.json journal.md
          git diff --cached --quiet || git commit -m "📊 Daily report $(date +'%Y-%m-%d')"
          git push

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="❌ AI美股日报生成失败，点击查看原因：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
